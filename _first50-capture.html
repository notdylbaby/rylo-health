<!doctype html><html><head><meta charset="utf-8"><style>html,body{margin:0;padding:0;background:#000;height:100%}iframe{width:1440px;height:980px;border:0;display:block}</style></head>
<body>
<iframe id="f" src="http://localhost:3000/index.html"></iframe>
<script>
const f=document.getElementById('f');
f.addEventListener('load',()=>{
  setTimeout(()=>{
    try{
      const w=f.contentWindow;
      const el=w.document.getElementById('first50');
      el.scrollIntoView({block:'start'});
      w.scrollBy(0,-40);
    }catch(e){console.error(e)}
  },500);
});
</script>
</body></html>
