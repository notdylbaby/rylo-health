<!DOCTYPE html><html><head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter';background:#f5f3ef;padding:60px 5vw;display:flex;gap:20px;justify-content:center;}
.pc{position:relative;background:#fff;border:1px solid rgba(0,0,0,0.06);border-radius:28px;overflow:hidden;cursor:pointer;aspect-ratio:5/6;display:flex;flex-direction:column;width:280px;box-shadow:0 8px 32px rgba(0,0,0,0.06);}
.pc-img-wrap{position:relative;flex:1;overflow:hidden;}
.pc-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:10% 16%;}
.pc-footer{padding:22px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.pc-label{font-size:1rem;font-weight:500;color:#353330;}
</style></head><body>
<div class="pc">
  <div class="pc-img-wrap"><img class="pc-img" src="GLP1PRODUCT.png"/></div>
  <div class="pc-footer"><span class="pc-label">Weight Loss</span></div>
</div>
<div class="pc">
  <div class="pc-img-wrap"><img class="pc-img" src="nadPRODUCT.png"/></div>
  <div class="pc-footer"><span class="pc-label">NAD+</span></div>
</div>
<div class="pc">
  <div class="pc-img-wrap"><img class="pc-img" src="GLP1PRODUCT.png"/></div>
  <div class="pc-footer"><span class="pc-label">Sleep</span></div>
</div>
</body></html>
